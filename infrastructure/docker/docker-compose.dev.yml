# ArrowERA CMS - Development Docker Compose
# Use this for local development

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: arrowera-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: arrowera_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: arrowera-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Application
  app:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.dev
    container_name: arrowera-app-dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/arrowera_dev
      REDIS_URL: redis://redis:6379
      AUTH_SECRET: dev-secret-change-in-production-min-32-chars-long-key
      APP_URL: http://localhost:3000
      PORT: 3000
      LOG_LEVEL: debug
    ports:
      - "3000:3000"
    volumes:
      - ../../.:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: pnpm dev

volumes:
  postgres_data_dev:
  redis_data_dev:
